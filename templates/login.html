<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Integra Sales</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Unbounded:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text: #f0f0f0;
            --muted: #6b6b6b;
            --accent: #ffffff;
            --red: #ff4444;
            --green: #00cc66;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .login-card .subtitle {
            color: var(--muted);
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .error-msg {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            font-size: 0.8rem;
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
        }
        .steps {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .step {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            padding: 0.75rem 0;
        }
        .step:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }
        .step-num {
            background: #fff;
            color: #000;
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 500;
            flex-shrink: 0;
        }
        .step-text {
            font-size: 0.82rem;
            line-height: 1.5;
            padding-top: 0.15rem;
        }
        .step-text code {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            color: var(--green);
            font-size: 0.85rem;
        }
        .hint {
            color: var(--muted);
            font-size: 0.72rem;
            line-height: 1.6;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Integra Sales</h1>
        <p class="subtitle">Вход через Telegram</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <div class="steps">
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-text">Откройте бота в Telegram</div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-text">Отправьте команду <code>/start</code></div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-text">Нажмите на ссылку, которую пришлёт бот — вы автоматически войдёте в систему</div>
            </div>
        </div>

        <div class="hint">
            Если бот не отвечает — попросите менеджера<br>добавить вас в команду
        </div>
    </div>
</body>
</html>
